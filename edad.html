<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calcular Edad</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ffd6e8,#c8e7ff);
        }

        .contenedor{
            width:400px;
            background:white;
            padding:30px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            animation:aparecer 1s ease;
        }

        @keyframes aparecer{
            from{
                opacity:0;
                transform:translateY(-30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            color:#ff4f9a;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ffd1e3;
            border-radius:12px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#ff4f9a;
            box-shadow:0 0 10px rgba(255,79,154,0.4);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:15px;
            background:#ff7eb3;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#ff4f9a;
            transform:scale(1.05);
            box-shadow:0 8px 15px rgba(255,79,154,0.4);
        }

        #resultado{
            margin-top:20px;
            padding:15px;
            border-radius:15px;
            background:#fff0f6;
            color:#ff4f9a;
            font-size:20px;
            font-weight:bold;
        }

        .btn-regresar{
            background:#6cbcff;
        }

        .btn-regresar:hover{
            background:#3a9df5;
        }
    </style>

    <script>
        function calcularEdad() {
            let fechaNac = document.getElementById("nacimiento").value;

            if (!fechaNac) {
                alert("Ingrese una fecha válida");
                return;
            }

            let hoy = new Date();
            let nacimiento = new Date(fechaNac);

            let edad = hoy.getFullYear() - nacimiento.getFullYear();
            let mes = hoy.getMonth() - nacimiento.getMonth();

            if (mes < 0 || (mes === 0 && hoy.getDate() < nacimiento.getDate())) {
                edad--;
            }

            document.getElementById("resultado").innerHTML =
                "🎂 Su edad es: " + edad + " años";
        }
    </script>

</head>

<body>

    <div class="contenedor">

        <h1>🎂 Cálculo de Edad</h1>

        <label>Ingrese su fecha de nacimiento:</label>

        <input type="date" id="nacimiento">

        <button onclick="calcularEdad()">
            Calcular Edad
        </button>

        <p id="resultado"></p>

        <button class="btn-regresar"
                onclick="window.location.href='calculadora.html'">
            ⬅ Regresar a la Calculadora
        </button>

    </div>

</body>
</html>
